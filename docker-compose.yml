
version: "3.9"

# Named volumes
volumes:
  postgres_data:
    driver: local

# Internal network
networks:
  hydrus-net:
    driver: bridge

# Services
services:

  # PostgreSQL
  db:
    image: postgres:16-alpine
    container_name: hydrus-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hydrus-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 10s
    # Uncomment below only for local development/debugging:
    # ports:
    #   - "5432:5432"

  # Backend FastAPI
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hydrus-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL:    postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      ENVIRONMENT:     ${ENVIRONMENT}
      APP_VERSION:     ${APP_VERSION}
    networks:
      - hydrus-net
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout:  10s
      retries:  3
      start_period: 20s
    # Resource limits — prevents one service from starving others
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

  # Frontend React (nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL}
    container_name: hydrus-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - hydrus-net
    ports:
      - "3000:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:80/nginx-health || exit 1"]
      interval: 30s
      timeout:  5s
      retries:  3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M

  # pgAdmin
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: hydrus-pgadmin
    profiles: ["tools"]
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    networks:
      - hydrus-net
    ports:
      - "5050:80"
    depends_on:
      - db