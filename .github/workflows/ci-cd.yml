name: CI/CD Pipeline — Build, Push, Deploy

on:
  push:
    branches:
      - main        # → Production deploy
      - develop     # → Dev deploy
  pull_request:
    branches:
      - main
      - develop

env:
  ACR_NAME: ${{ secrets.ACR_LOGIN_SERVER }}
  AKS_CLUSTER: ${{ secrets.AKS_CLUSTER_NAME }}
  AKS_RG: ${{ secrets.AKS_RESOURCE_GROUP }}
  K8S_NAMESPACE: hydrus

jobs:
  # ── Job 1: Code Quality ─────────────────────────────────────────────────────
  code-quality:
    name: Code Quality & Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # SonarQube needs full history

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Lint backend
        working-directory: backend
        run: |
          pip install ruff
          ruff check .

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # ── Job 2: Build & Push ─────────────────────────────────────────────────────
  build-push:
    name: Build Docker Images & Push to ACR
    runs-on: ubuntu-latest
    needs: code-quality
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          BRANCH=$(echo "${{ github.ref_name }}" | tr '/' '-')
          echo "image_tag=${BRANCH}-${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR Login
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: runtime
          push: true
          tags: |
            ${{ env.ACR_NAME }}/hydrus-backend:${{ steps.meta.outputs.image_tag }}
            ${{ env.ACR_NAME }}/hydrus-backend:latest

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: runtime
          push: true
          build-args: |
            REACT_APP_API_URL=${{ secrets.API_BASE_URL }}
          tags: |
            ${{ env.ACR_NAME }}/hydrus-frontend:${{ steps.meta.outputs.image_tag }}
            ${{ env.ACR_NAME }}/hydrus-frontend:latest

      - name: Trivy Scan — Backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.ACR_NAME }}/hydrus-backend:${{ steps.meta.outputs.image_tag }}"
          format: "sarif"
          output: "trivy-backend.sarif"
          exit-code: "1"
          severity: "CRITICAL,HIGH"

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-backend.sarif

  # ── Job 3: Deploy ───────────────────────────────────────────────────────────
  deploy:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    needs: build-push
    if: github.event_name == 'push'   # Deploy only on push, not PRs
    environment:
      name: ${{ github.ref_name == 'main' && 'production' || 'development' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS context
        run: |
          az aks get-credentials \
            --resource-group ${{ env.AKS_RG }} \
            --name ${{ env.AKS_CLUSTER }} \
            --overwrite-existing

      - name: Update image tags in manifests
        run: |
          IMAGE_TAG=${{ needs.build-push.outputs.image_tag }}
          kubectl set image deployment/hydrus-backend \
            backend=${{ env.ACR_NAME }}/hydrus-backend:${IMAGE_TAG} \
            -n ${{ env.K8S_NAMESPACE }} || true
          kubectl set image deployment/hydrus-frontend \
            frontend=${{ env.ACR_NAME }}/hydrus-frontend:${IMAGE_TAG} \
            -n ${{ env.K8S_NAMESPACE }} || true

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/postgres-statefulset.yaml
          kubectl apply -f k8s/backend-deployment.yaml
          kubectl apply -f k8s/frontend-deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl apply -f k8s/ingress.yaml
          kubectl apply -f k8s/hpa.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/hydrus-backend -n ${{ env.K8S_NAMESPACE }} --timeout=180s
          kubectl rollout status deployment/hydrus-frontend -n ${{ env.K8S_NAMESPACE }} --timeout=180s

      - name: Smoke Test — Health Endpoint
        run: |
          INGRESS_IP=$(kubectl get ingress hydrus-ingress -n ${{ env.K8S_NAMESPACE }} \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          echo "Ingress IP: $INGRESS_IP"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --resolve hydrus.example.com:443:$INGRESS_IP \
            https://hydrus.example.com/health --insecure)
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Smoke test FAILED — HTTP $HTTP_STATUS"
            exit 1
          fi
          echo "Smoke test PASSED — HTTP $HTTP_STATUS"

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Deployment failed — rolling back..."
          kubectl rollout undo deployment/hydrus-backend -n ${{ env.K8S_NAMESPACE }}
          kubectl rollout undo deployment/hydrus-frontend -n ${{ env.K8S_NAMESPACE }}
          echo "Rollback complete."
