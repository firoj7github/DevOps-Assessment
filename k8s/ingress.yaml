apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hydrus-ingress
  namespace: hydrus
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - hydrus.example.com
      secretName: hydrus-tls
  rules:
    - host: hydrus.example.com
      http:
        paths:
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: hydrus-backend-svc
                port:
                  number: 80
          - path: /health
            pathType: Exact
            backend:
              service:
                name: hydrus-backend-svc
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hydrus-frontend-svc
                port:
                  number: 80