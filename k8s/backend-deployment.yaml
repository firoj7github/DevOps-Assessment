apiVersion: apps/v1
kind: Deployment
metadata:
  name: hydrus-backend
  namespace: hydrus
  labels:
    app: hydrus-backend
    tier: api
spec:
  replicas: 2
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: hydrus-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0      # Zero-downtime deployment
  template:
    metadata:
      labels:
        app: hydrus-backend
        tier: api
    spec:
      # Security context — don't run as root
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001

      containers:
        - name: backend
          image: hydrus-backend
          imagePullPolicy: Always
          ports:
            - containerPort: 8000

          # Config from ConfigMap
          envFrom:
            - configMapRef:
                name: hydrus-config

          # Secrets injected as env vars
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: hydrus-db-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hydrus-db-secret
                  key: DB_PASSWORD

          # Liveness probe — restarts container if app hangs
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 5

          # Readiness probe — removes pod from LB until truly ready
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5

          # Resource limits prevent noisy-neighbor issues
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          # Read-only filesystem for security
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false

      restartPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: hydrus-backend-svc
  namespace: hydrus
spec:
  # ClusterIP = internal only (backend should NOT be public)
  type: ClusterIP
  selector:
    app: hydrus-backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000