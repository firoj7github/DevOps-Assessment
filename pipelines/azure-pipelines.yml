trigger:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - backend/**
      - frontend/**
      - k8s/**

pr:
  branches:
    include:
      - main

variables:
  acrLoginServer: $(ACR_LOGIN_SERVER)
  aksCluster:     $(AKS_CLUSTER_NAME)
  aksRG:          $(AKS_RESOURCE_GROUP)
  k8sNamespace:   hydrus

# ══════════════════════════════════════════════════════════
# STAGE 1 — Code Quality (SonarQube)
# ══════════════════════════════════════════════════════════
stages:
- stage: Analysis
  displayName: "Stage 1 — Code Quality Analysis"
  jobs:
    - job: SonarScan
      displayName: "SonarQube Scan"
      pool:
        vmImage: ubuntu-latest
      steps:
        - task: SonarQubePrepare@6
          displayName: "Prepare SonarQube"
          inputs:
            SonarQube: 'SonarQube_Service_Connection'
            scannerMode: 'CLI'
            configMode: 'manual'
            cliProjectKey: 'hydrus-devops-assessment'
            cliProjectName: 'Hydrus'

        - script: |
            echo "Running SonarQube scanner..."
          displayName: "Run Scanner"

        - task: SonarQubePublish@6
          displayName: "Publish SonarQube Results"
          inputs:
            pollingTimeoutSec: '300'

# ══════════════════════════════════════════════════════════
# STAGE 2 — Build, Security Scan & Push to ACR
# ══════════════════════════════════════════════════════════
- stage: Build
  displayName: "Stage 2 — Build & Push Images"
  dependsOn: Analysis
  jobs:
    - job: BuildPush
      displayName: "Docker Build, Trivy Scan & ACR Push"
      pool:
        vmImage: ubuntu-latest
      steps:
        - script: |
            SAFE_BRANCH=$(echo "$(Build.SourceBranchName)" | tr '/' '-')
            SHORT_SHA=$(echo "$(Build.SourceVersion)" | cut -c1-8)
            FINAL_TAG="${SAFE_BRANCH}-${SHORT_SHA}"
            echo "Image tag: $FINAL_TAG"
            echo "##vso[task.setvariable variable=imageTag;isOutput=true]$FINAL_TAG"
          name: SetTag
          displayName: "Set Image Tag"

        - task: AzureCLI@2
          displayName: "ACR Login"
          inputs:
            azureSubscription: $(AZURE_SERVICE_CONNECTION)
            scriptType: bash
            scriptLocation: inlineScript
            inlineScript: az acr login --name $(ACR_NAME)

        # ── BACKEND 
        - task: Docker@2
          displayName: "Build Backend Image"
          inputs:
            command: build
            repository: $(acrLoginServer)/hydrus-backend
            dockerfile: backend/Dockerfile
            tags: |
              $(SetTag.imageTag)
              latest

        - script: |
            mkdir -p $(Build.ArtifactStagingDirectory)/trivy

            docker run --rm \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -v $(Build.ArtifactStagingDirectory)/trivy:/report \
              aquasec/trivy image \
              --exit-code 1 \
              --severity CRITICAL,HIGH \
              --ignore-unfixed \
              --format json \
              --output /report/backend-trivy.json \
              $(acrLoginServer)/hydrus-backend:$(SetTag.imageTag)
          displayName: "Trivy Scan — Backend"

        - task: Docker@2
          displayName: "Push Backend to ACR"
          inputs:
            command: push
            repository: $(acrLoginServer)/hydrus-backend
            containerRegistry: $(AZURE_CONTAINER_REGISTRY_SERVICE_CONNECTION)
            tags: |
              $(SetTag.imageTag)
              latest

        # ── FRONTEND 
        - task: Docker@2
          displayName: "Build Frontend Image"
          inputs:
            command: build
            repository: $(acrLoginServer)/hydrus-frontend
            dockerfile: frontend/Dockerfile
            tags: |
              $(SetTag.imageTag)
              latest

        - script: |
            docker run --rm \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -v $(Build.ArtifactStagingDirectory)/trivy:/report \
              aquasec/trivy image \
              --exit-code 1 \
              --severity CRITICAL,HIGH \
              --ignore-unfixed \
              --format json \
              --output /report/frontend-trivy.json \
              $(acrLoginServer)/hydrus-frontend:$(SetTag.imageTag)
          displayName: "Trivy Scan — Frontend"

        - task: Docker@2
          displayName: "Push Frontend to ACR"
          inputs:
            command: push
            repository: $(acrLoginServer)/hydrus-frontend
            containerRegistry: $(AZURE_CONTAINER_REGISTRY_SERVICE_CONNECTION)
            tags: |
              $(SetTag.imageTag)
              latest

        - task: PublishBuildArtifacts@1
          displayName: "Publish Trivy Scan Reports"
          condition: always()
          inputs:
            pathToPublish: $(Build.ArtifactStagingDirectory)/trivy
            artifactName: trivy-reports


# STAGE 3 — Deploy to AKS

- stage: Deploy
  displayName: "Stage 3 — Deploy to AKS"
  dependsOn: Build
  condition: and(succeeded(), in(variables['Build.SourceBranchName'], 'main', 'develop'))
  jobs:
    - deployment: DeployAKS
      displayName: "Deploy to AKS"
      environment: "$(k8sNamespace)"
      pool:
        vmImage: ubuntu-latest
      strategy:
        runOnce:
          deploy:
            steps:
              - checkout: self
              - script: |
                  SAFE_BRANCH=$(echo "$(Build.SourceBranchName)" | tr '/' '-')
                  SHORT_SHA=$(echo "$(Build.SourceVersion)" | cut -c1-8)
                  FINAL_TAG="${SAFE_BRANCH}-${SHORT_SHA}"
                  echo "Deploying image tag: $FINAL_TAG"
                  echo "##vso[task.setvariable variable=imageTag]$FINAL_TAG"
                name: SetDeployTag
                displayName: "Set Deploy Image Tag"

              - task: AzureCLI@2
                displayName: "Get AKS Credentials"
                inputs:
                  azureSubscription: $(AZURE_SERVICE_CONNECTION)
                  scriptType: bash
                  scriptLocation: inlineScript
                  inlineScript: |
                    az aks get-credentials \
                      --resource-group $(aksRG) \
                      --name $(aksCluster) \
                      --overwrite-existing

              
              - task: AzureKeyVault@2
                displayName: "Fetch Secrets from Key Vault"
                inputs:
                  azureSubscription: $(AZURE_SERVICE_CONNECTION)
                  KeyVaultName: $(KEY_VAULT_NAME)
                  SecretsFilter: 'DB-USER,DB-PASSWORD'
                  RunAsPreJob: false

              - task: AzureCLI@2
                displayName: "Create K8s Secret from Key Vault"
                inputs:
                  azureSubscription: $(AZURE_SERVICE_CONNECTION)
                  scriptType: bash
                  scriptLocation: inlineScript
                  inlineScript: |
                    kubectl create secret generic hydrus-db-secret \
                      --namespace=$(k8sNamespace) \
                      --from-literal=DB_USER='$(DB-USER)' \
                      --from-literal=DB_PASSWORD='$(DB-PASSWORD)' \
                      --dry-run=client -o yaml | kubectl apply -f -

              - task: KubernetesManifest@1
                displayName: "Apply K8s Manifests"
                inputs:
                  action: deploy
                  namespace: $(k8sNamespace)
                  manifests: |
                    k8s/namespace.yaml
                    k8s/configmap.yaml
                    k8s/postgres-statefulset.yaml
                    k8s/backend-deployment.yaml
                    k8s/frontend-deployment.yaml
                    k8s/service.yaml
                    k8s/ingress.yaml
                    k8s/hpa.yaml
                  containers: |
                    $(acrLoginServer)/hydrus-backend:$(imageTag)
                    $(acrLoginServer)/hydrus-frontend:$(imageTag)

              # Smoke test will run after the pod is fully ready
              - task: AzureCLI@2
                displayName: "Wait for Rollout"
                inputs:
                  azureSubscription: $(AZURE_SERVICE_CONNECTION)
                  scriptType: bash
                  scriptLocation: inlineScript
                  inlineScript: |
                    kubectl rollout status deployment/hydrus-backend \
                      -n $(k8sNamespace) --timeout=120s
                    kubectl rollout status deployment/hydrus-frontend \
                      -n $(k8sNamespace) --timeout=120s

              - task: AzureCLI@2
                displayName: "Smoke Test — Health Check"
                inputs:
                  azureSubscription: $(AZURE_SERVICE_CONNECTION)
                  scriptType: bash
                  scriptLocation: inlineScript
                  inlineScript: |
                    sleep 15
                    STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                      https://hydrus.example.com/health)
                    echo "Health check HTTP status: $STATUS"
                    if [ "$STATUS" != "200" ]; then
                      echo "##vso[task.logissue type=error]Smoke test failed — HTTP $STATUS"
                      exit 1
                    fi

              # If the smoke test fails, this step runs and rolls back to the previous revision
              - task: AzureCLI@2
                displayName: "Rollback on Failure"
                condition: failed()
                inputs:
                  azureSubscription: $(AZURE_SERVICE_CONNECTION)
                  scriptType: bash
                  scriptLocation: inlineScript
                  inlineScript: |
                    echo "##vso[task.logissue type=warning]Rolling back to previous revision..."
                    kubectl rollout undo deployment/hydrus-backend -n $(k8sNamespace)
                    kubectl rollout undo deployment/hydrus-frontend -n $(k8sNamespace)
                    kubectl rollout status deployment/hydrus-backend \
                      -n $(k8sNamespace) --timeout=60s
                    kubectl rollout status deployment/hydrus-frontend \
                      -n $(k8sNamespace) --timeout=60s
                    echo "Rollback complete."
                    exit 1