trigger:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - backend/**
      - frontend/**
      - k8s/**

pr:
  branches:
    include:
      - main

variables:
  # Variable Group থেকে আসবে
  acrLoginServer: $(ACR_LOGIN_SERVER)
  aksCluster:     $(AKS_CLUSTER_NAME)
  aksRG:          $(AKS_RESOURCE_GROUP)
  k8sNamespace:   hydrus
  imageTag:       $(Build.SourceBranchName)-$(Build.SourceVersion)

stages:

# STAGE 1: Code Quality & Security (SonarQube)
- stage: Analysis
  displayName: "Code Quality Analysis"
  jobs:
    - job: SonarScan
      displayName: "SonarQube Scan"
      pool:
        vmImage: ubuntu-latest
      steps:
        - task: SonarQubePrepare@5
          inputs:
            SonarQube: 'SonarQube_Service_Connection'
            scannerMode: 'CLI'
            configMode: 'manual'
            cliProjectKey: 'hydrus-devops-assessment'
        
        - script: |
            echo "Running scanner for backend and frontend..."
          displayName: "Run Analysis"

        - task: SonarQubePublish@5
          inputs:
            pollingTimeoutSec: '300'

# ── STAGE 2: Build & Container Security (Trivy) ──────────────────────────────
- stage: Build
  displayName: "Build & Push Images"
  dependsOn: Analysis
  jobs:
    - job: BuildPush
      displayName: "Docker Build, Scan & Push"
      pool:
        vmImage: ubuntu-latest
      steps:
        # 1. Azure ACR Login
        - task: AzureCLI@2
          displayName: "ACR Login"
          inputs:
            azureSubscription: $(AZURE_SERVICE_CONNECTION)
            scriptType: bash
            scriptLocation: inlineScript
            inlineScript: az acr login --name $(ACR_NAME)

        # 2. Backend Build & Local Scan
        - task: Docker@2
          displayName: "Build Backend Locally"
          inputs:
            command: build
            repository: hydrus-backend
            dockerfile: backend/Dockerfile
            tags: $(imageTag)

        - task: AzureCLI@2
          displayName: "Trivy Scan Backend"
          inputs:
            azureSubscription: $(AZURE_SERVICE_CONNECTION)
            scriptType: bash
            inlineScript: |
              docker run --rm aquasec/trivy image --exit-code 1 --severity CRITICAL,HIGH hydrus-backend:$(imageTag)

        - task: Docker@2
          displayName: "Push Backend to ACR"
          inputs:
            command: push
            repository: hydrus-backend
            containerRegistry: $(AZURE_CONTAINER_REGISTRY_SERVICE_CONNECTION)
            tags: |
              $(imageTag)
              latest

        # 3. Frontend Build & Local Scan
        - task: Docker@2
          displayName: "Build Frontend Locally"
          inputs:
            command: build
            repository: hydrus-frontend
            dockerfile: frontend/Dockerfile
            tags: $(imageTag)

        - task: AzureCLI@2
          displayName: "Trivy Scan Frontend"
          inputs:
            azureSubscription: $(AZURE_SERVICE_CONNECTION)
            scriptType: bash
            inlineScript: |
              docker run --rm aquasec/trivy image --exit-code 1 --severity CRITICAL,HIGH hydrus-frontend:$(imageTag)

        - task: Docker@2
          displayName: "Push Frontend to ACR"
          inputs:
            command: push
            repository: hydrus-frontend
            containerRegistry: $(AZURE_CONTAINER_REGISTRY_SERVICE_CONNECTION)
            tags: |
              $(imageTag)
              latest

# STAGE 3: Deploy & Rollback (AKS)
- stage: Deploy
  displayName: "Deploy to AKS"
  dependsOn: Build
  condition: and(succeeded(), in(variables['Build.SourceBranchName'], 'main', 'develop'))
  jobs:
    - deployment: DeployAKS
      displayName: "Deploy to AKS"
      environment: "$(k8sNamespace)"
      pool:
        vmImage: ubuntu-latest
      strategy:
        runOnce:
          deploy:
            steps:
              - task: AzureCLI@2
                displayName: "Get AKS Credentials"
                inputs:
                  azureSubscription: $(AZURE_SERVICE_CONNECTION)
                  scriptType: bash
                  inlineScript: az aks get-credentials --resource-group $(aksRG) --name $(aksCluster) --overwrite-existing

              - task: KubernetesManifest@1
                displayName: "Apply K8s Manifests"
                inputs:
                  action: deploy
                  namespace: $(k8sNamespace)
                  manifests: |
                    k8s/namespace.yaml
                    k8s/configmap.yaml
                    k8s/secret-example.yaml
                    k8s/backend-deployment.yaml
                    k8s/frontend-deployment.yaml
                    k8s/service.yaml
                    k8s/ingress.yaml
                    k8s/hpa.yaml
                  containers: |
                    $(acrLoginServer)/hydrus-backend:$(imageTag)
                    $(acrLoginServer)/hydrus-frontend:$(imageTag)

              - task: AzureCLI@2
                displayName: "Smoke Test"
                inputs:
                  azureSubscription: $(AZURE_SERVICE_CONNECTION)
                  scriptType: bash
                  inlineScript: |
                    sleep 30 
                    STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://hydrus.example.com/health)
                    echo "Health check status: $STATUS"
                    [ "$STATUS" = "200" ] || exit 1

              # ফেইল করলে অটোমেটিক রোলব্যাক
              - task: AzureCLI@2
                displayName: "Rollback on Failure"
                condition: failed()
                inputs:
                  azureSubscription: $(AZURE_SERVICE_CONNECTION)
                  scriptType: bash
                  inlineScript: |
                    echo "Smoke test failed! Triggering rollback..."
                    kubectl rollout undo deployment/hydrus-backend -n $(k8sNamespace)
                    kubectl rollout undo deployment/hydrus-frontend -n $(k8sNamespace)